name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to create or update (for example, v1.0.0)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_ENV: production

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK packages
        run: >-
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          "platforms;android-36"
          "build-tools;36.0.0"
          "ndk;27.1.12297006"
          "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Install JavaScript dependencies
        run: npm ci --include=dev

      - name: Build release APK
        working-directory: android
        run: >-
          ./gradlew app:assembleRelease
          -PreactNativeArchitectures=arm64-v8a
          --no-daemon

      - name: Package experimental APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk whip-experimental-arm64.apk
          sha256sum whip-experimental-arm64.apk > whip-experimental-arm64.apk.sha256

      - name: Upload experimental APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: whip-experimental-arm64-apk
          path: |
            whip-experimental-arm64.apk
            whip-experimental-arm64.apk.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Create GitHub Release and upload APK
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            release_args=(
              "$RELEASE_TAG"
              --target "$GITHUB_SHA"
              --generate-notes
              --latest=false
              --prerelease
              --title "Whip $RELEASE_TAG (experimental preview)"
              --notes "Experimental preview. Connect only through a trusted Tailnet. SSH host keys are not yet verified. This ARM64 APK is preview-signed, and its signing identity may change before a stable release."
            )
            gh release create "${release_args[@]}"
          fi

          gh release upload "$RELEASE_TAG" \
            "whip-experimental-arm64.apk#Whip experimental APK (arm64-v8a)" \
            "whip-experimental-arm64.apk.sha256#SHA-256 checksum" \
            --clobber
