name: Bug report
description: Report a reproducible problem in Whip
title: 'bug: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Whip is an experimental preview. Connect only through a trusted Tailnet. SSH host keys are not yet verified.

        Never include passwords, private keys, Tailnet IP addresses, or sensitive terminal output. Report security problems privately through the repository Security tab.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and Discussions for this problem.
          required: true
        - label: I reproduced the problem on the latest commit or newest preview release.
          required: true
        - label: I removed credentials and sensitive host or terminal data.
          required: true
  - type: input
    id: build
    attributes:
      label: Whip version
      description: Preview tag or commit SHA
      placeholder: v0.1.0-preview.1 or abc1234
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Android device
      description: Manufacturer, model, Android version, and CPU architecture
      placeholder: Google Pixel 8, Android 16, arm64-v8a
    validations:
      required: true
  - type: input
    id: herdr
    attributes:
      label: Herdr version
      placeholder: Output of herdr --version
    validations:
      required: true
  - type: dropdown
    id: auth
    attributes:
      label: SSH authentication
      options:
        - Password
        - Private key without passphrase
        - Private key with passphrase
        - Not connection-related
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: Provide the smallest reliable sequence that demonstrates the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Drag files here or paste redacted text. Do not include secrets or private terminal output.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include whether the equivalent SSH/Herdr command works outside Whip.
